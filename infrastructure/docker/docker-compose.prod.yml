name: ai-career-platform

# Production topology for a single free-tier EC2 box: Postgres and Qdrant are NOT
# containers here — Postgres is AWS RDS, Qdrant is Qdrant Cloud (both external, see
# services/{api,runtime}/.env.prod). This file only runs what actually needs to live on
# the box: redis (session cache — AWS ElastiCache isn't reliably free-tier), the three
# app services, and Caddy as a plain HTTP reverse proxy (no domain/TLS set up yet —
# see Caddyfile).
#
# Build context is the repo root, same as docker-compose.yml, so this must be run from
# there: `docker compose -f infrastructure/docker/docker-compose.prod.yml up -d --build`

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Runtime (LangGraph agents) ─────────────────────────────────────────────
  runtime:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.runtime
    restart: unless-stopped
    env_file:
      - ../../services/runtime/.env.prod
    depends_on:
      redis:
        condition: service_healthy
    # No healthcheck override here — Dockerfile.runtime already defines a working one
    # (Python urllib, not curl; neither this nor the api image installs curl, so a
    # curl-based override here can never succeed — see docs/DEPLOYMENT.md Troubleshooting).
    # Compose falls back to the image's own HEALTHCHECK when none is specified.

  # ── API gateway ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../../services/api/.env.prod
    environment:
      REDIS_URL: redis://redis:6379
      RUNTIME_URL: http://runtime:8001
    depends_on:
      redis:
        condition: service_healthy
      runtime:
        condition: service_healthy
    # Same as runtime above — Dockerfile.api's own HEALTHCHECK (urllib, not curl) applies.

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    restart: unless-stopped
    environment:
      # Browser calls this directly (not over the Docker network) — set to
      # http://<elastic-ip-or-public-dns> before deploying (no domain/TLS yet).
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?set PUBLIC_API_URL in the shell env or an .env next to this file}
    depends_on:
      api:
        condition: service_healthy

  # ── Reverse proxy (plain HTTP for now — see Caddyfile) ────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy

volumes:
  redis_data:
  caddy_data:
  caddy_config:
