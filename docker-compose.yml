name: ai-career-platform

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    # v1.9.3 predates Qdrant's unified Query API (/points/query, added in 1.10) that
    # qdrant-client>=1.18's AsyncQdrantClient.query_points() requires — client 1.18
    # dropped .search() entirely, so retrieval 404s against anything older than 1.10.
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Runtime (LangGraph agents) ─────────────────────────────────────────────
  runtime:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.runtime
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - services/runtime/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-portfolio}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No healthcheck override — Dockerfile.runtime's own HEALTHCHECK (Python urllib)
    # already works; a curl-based override here can never succeed, since this image
    # never installs curl. See docs/DEPLOYMENT.md's Troubleshooting section.

  # ── API gateway ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - services/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-portfolio}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      RUNTIME_URL: http://runtime:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      runtime:
        condition: service_healthy
    # Same as runtime above — Dockerfile.api's own HEALTHCHECK applies instead.

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
